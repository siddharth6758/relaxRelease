<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RelaxRelease{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        nav {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        nav .logo {
            font-size: 18px;
            font-weight: 600;
            color: #58a6ff;
            text-decoration: none;
        }
        nav a {
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
        }
        nav a:hover { color: #e6edf3; }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .page-subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 12px;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-minor { background: #1f4a1f; color: #56d364; }
        .badge-major { background: #3d1f1f; color: #f78166; }
        .badge-draft { background: #2d333b; color: #8b949e; }
        .btn {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-primary {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
        }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #30363d; }
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: #8b949e;
        }
        .empty-state h3 { margin-bottom: 8px; color: #e6edf3; }
        pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">🚀 RelaxRelease</a>
        <a href="/">Releases</a>
        <a href="/settings">Settings</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
