{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto px-6 py-10">
    <a href="/admin" class="text-gray-500 text-sm hover:text-gray-300 transition">← Admin</a>
    <h1 class="text-2xl font-bold text-white mt-4 mb-8">Support Tickets</h1>
    <div class="space-y-3">
        {% for ticket in tickets %}
        <a href="/admin/tickets/{{ ticket.id }}" class="block bg-gray-900 border border-gray-800 rounded-xl px-5 py-4 hover:border-gray-600 transition">
            <div class="flex justify-between items-center">
                <span class="text-white font-medium">{{ ticket.subject }}</span>
                <span class="text-xs px-2 py-1 rounded-full
                    {% if ticket.status == 'open' %}bg-yellow-900 text-yellow-300
                    {% elif ticket.status == 'in_progress' %}bg-blue-900 text-blue-300
                    {% else %}bg-gray-800 text-gray-400{% endif %}">
                    {{ ticket.status.replace('_', ' ').title() }}
                </span>
            </div>
            <p class="text-gray-500 text-xs mt-1">{{ ticket.created_at.strftime('%b %d, %Y at %H:%M') }}</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
